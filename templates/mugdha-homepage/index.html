<!-- @template name="Mugdha Homepage" description="Premium saree-house homepage — hero, trust bar, occasions, new arrivals, testimonials, stores, footer." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mugdha — A house of handloom sarees</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; font-family: var(--font-body); background: var(--mulberry-ink); color: var(--text-body); -webkit-font-smoothing: antialiased; }
  img { max-width: 100%; }

  /* responsive helpers */
  .d-only { display: flex; }
  .m-only { display: none !important; }

  /* nav links — refined underline on hover */
  .mnav-link {
    font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 500;
    letter-spacing: 0.04em; color: var(--oyster); text-decoration: none; opacity: 0.88;
    position: relative; padding-bottom: 3px; white-space: nowrap;
    transition: opacity var(--motion-fast) var(--ease-standard);
  }
  .mnav-link::after {
    content: ""; position: absolute; left: 0; right: 100%; bottom: 0; height: 1px;
    background: var(--zari); transition: right var(--motion-base) var(--ease-silk);
  }
  .mnav-link:hover { opacity: 1; }
  .mnav-link:hover::after { right: 0; }

  /* Assisted Live Shop button in the header */
  .massist-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--zari-30);
    color: var(--zari); cursor: pointer;
    font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 600;
    letter-spacing: 0.02em; padding: 8px 14px; border-radius: var(--radius-md);
    margin-right: 6px; white-space: nowrap;
    transition: background var(--motion-fast) var(--ease-standard), border-color var(--motion-fast) var(--ease-standard);
  }
  .massist-btn:hover { background: rgba(199,162,74,0.12); border-color: var(--zari); }

  /* Trust bar */
  .mtrust {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .mtrust-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 26px 28px;
    border-right: 1px solid var(--ink-on-oyster-08);
  }
  .mtrust-item:last-child { border-right: none; }
  .mtrust-icon {
    flex: none; width: 42px; height: 42px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--magenta); border: 1px solid var(--zari-30); background: rgba(199,162,74,0.06);
  }
  .mtrust-label { font-family: var(--font-body); font-size: var(--fs-base); font-weight: 600; color: var(--text-strong); white-space: nowrap; }
  .mtrust-sub { font-family: var(--font-body); font-size: var(--fs-sm); color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

  /* hero type */
  .mhero-eyebrow, .mocc-eyebrow {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--font-body); font-size: var(--fs-xs); font-weight: 600;
    letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--zari);
    white-space: nowrap;
  }
  .mhero-h1 {
    font-family: var(--font-display); font-weight: 600; font-size: var(--fs-hero);
    line-height: var(--leading-tight); letter-spacing: var(--tracking-display);
    color: var(--oyster); margin: 22px 0 0;
  }
  .mhero-sub {
    font-family: var(--font-body); font-size: var(--fs-lg); line-height: 1.5;
    color: rgba(239,234,225,0.82); margin: 20px 0 0; max-width: 42ch;
  }

  /* occasion grid */
  .mocc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

  /* shop by fabric — category tiles */
  .mfabcat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
  .mfabcat-tile { position: relative; aspect-ratio: 3/2; border-radius: var(--radius-lg); overflow: hidden; display: block; text-decoration: none; }
  .mfabcat-tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform var(--motion-slow) var(--ease-silk); }
  .mfabcat-tile:hover img { transform: scale(1.04); }
  .mfabcat-scrim { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(36,14,21,0.72) 0%, rgba(36,14,21,0.12) 50%, transparent 100%); }
  .mfabcat-name { position: absolute; bottom: 18px; left: 20px; right: 20px; font-family: var(--font-display); font-size: var(--fs-subtitle); font-weight: 600; color: var(--oyster); letter-spacing: var(--tracking-display); }

  /* new arrivals rail */
  .mfab-rail { display: flex; gap: 22px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 8px; scrollbar-width: none; }
  .mfab-rail::-webkit-scrollbar { display: none; }
  .mfab-item { flex: 0 0 clamp(220px, 26%, 300px); scroll-snap-align: start; }

  /* testimonials — editorial */
  .mtest { display: grid; grid-template-columns: 1.5fr 1fr; gap: clamp(2rem, 5vw, 5rem); align-items: stretch; }
  .mtest-main { position: relative; padding-left: clamp(0px, 4vw, 64px); }
  .mtest-mark { position: absolute; left: -8px; top: -44px; font-family: var(--font-display); font-weight: 600; font-size: clamp(120px, 16vw, 220px); line-height: 1; color: var(--zari); opacity: 0.22; pointer-events: none; }
  .mtest-main .mocc-eyebrow { position: relative; }
  .mtest-quote {
    font-family: var(--font-display); font-weight: 400; font-size: clamp(1.6rem, 1rem + 2.4vw, 3rem);
    line-height: 1.22; letter-spacing: var(--tracking-display); color: var(--oyster);
    margin: 22px 0 0; max-width: 26ch; text-wrap: balance; opacity: 1;
    animation: mtest-rise var(--motion-slow) var(--ease-silk);
  }
  @keyframes mtest-rise { from { transform: translateY(10px); } to { transform: none; } }
  .mtest-author { margin-top: 28px; opacity: 1; animation: mtest-rise var(--motion-slow) var(--ease-silk); }
  .mtest-stars { display: flex; gap: 3px; margin-bottom: 12px; }
  .mtest-name { font-family: var(--font-body); font-weight: 600; font-size: var(--fs-md); color: var(--oyster); }
  .mtest-meta { font-family: var(--font-body); font-size: var(--fs-sm); color: var(--smoke-taupe); margin-top: 3px; }
  .mtest-nav { display: flex; align-items: center; gap: 18px; margin-top: 34px; }
  .mtest-nav button { width: 46px; height: 46px; border-radius: 999px; border: 1px solid var(--zari-30); background: transparent; color: var(--oyster); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background var(--motion-fast) var(--ease-standard), border-color var(--motion-fast) var(--ease-standard); }
  .mtest-nav button:hover { background: rgba(199,162,74,0.12); border-color: var(--zari); }
  .mtest-index { font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 600; color: var(--oyster); letter-spacing: 0.08em; font-variant-numeric: tabular-nums; }
  .mtest-index span { color: var(--smoke-taupe); }

  .mtest-panel { border: 1px solid var(--zari-30); border-radius: var(--radius-lg); background: rgba(199,162,74,0.05); padding: clamp(24px, 3vw, 38px); display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; }
  .mtest-rating { font-family: var(--font-display); font-weight: 600; font-size: clamp(3.5rem, 6vw, 5rem); line-height: 1; color: var(--zari); }
  .mtest-rating-stars { display: flex; gap: 4px; margin-top: 12px; }
  .mtest-rating-sub { font-family: var(--font-body); font-size: var(--fs-sm); color: rgba(239,234,225,0.72); margin-top: 12px; max-width: 24ch; line-height: 1.5; }
  .mtest-stats { display: flex; gap: 0; margin-top: 28px; width: 100%; border-top: 1px solid var(--zari-15); padding-top: 24px; }
  .mtest-stats div { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .mtest-stats div + div { border-left: 1px solid var(--zari-15); }
  .mtest-stats strong { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-subtitle); color: var(--oyster); }
  .mtest-stats span { font-family: var(--font-body); font-size: var(--fs-xs); color: var(--smoke-taupe); letter-spacing: 0.04em; }
  .mtest-verified { display: inline-flex; align-items: center; gap: 8px; margin-top: 26px; font-family: var(--font-body); font-size: var(--fs-xs); font-weight: 600; letter-spacing: 0.04em; color: var(--zari); }
  .mtest-verified i { width: 15px; height: 15px; }

  /* stores */
  .mstores-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(2rem, 5vw, 5rem); align-items: stretch; }

  /* footer */
  .mfoot-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: clamp(2rem, 4vw, 4rem); }
  .mfoot-base { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }

  /* assisted shopping — desktop corner card */
  .massist {
    position: fixed; z-index: 65; right: 28px; bottom: 28px; width: 360px;
    background: var(--mulberry-ink-90); border: 1px solid var(--zari-30);
    border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--glow-zari);
    transform: translateY(24px); opacity: 0; pointer-events: none;
    transition: transform var(--motion-slow) var(--ease-silk), opacity var(--motion-slow) var(--ease-silk);
  }
  .massist[data-open="1"] { transform: translateY(0); opacity: 1; pointer-events: auto; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .mtest-quote { animation: none; }
    .mtest-author { animation: none; }
  }

  /* ---- mobile ---- */
  @media (max-width: 820px) {
    .d-only { display: none !important; }
    .m-only { display: inline-flex !important; }

    /* hero */
    .mhero-sub { font-size: var(--fs-md); max-width: none; }

    /* trust bar */
    .mtrust { grid-template-columns: 1fr 1fr; gap: 0; }
    .mtrust-item { padding: 18px 14px; gap: 10px; }
    .mtrust-item:nth-child(2) { border-right: none; }
    .mtrust-item:nth-child(1), .mtrust-item:nth-child(2) { border-bottom: 1px solid var(--ink-on-oyster-08); }
    .mtrust-item:nth-child(3) { border-bottom: none; }
    .mtrust-icon { width: 36px; height: 36px; flex: none; }
    .mtrust-label { white-space: normal; line-height: 1.25; font-size: var(--fs-sm); }
    .mtrust-sub { display: none; }

    /* occasions */
    .mocc-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }

    /* fabric category tiles */
    .mfabcat-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-4); }
    .mfabcat-name { font-size: var(--fs-md); bottom: 14px; }

    /* new arrivals carousel */
    .mfab-item { flex-basis: 76%; }

    /* testimonials */
    .mtest { grid-template-columns: 1fr; gap: var(--space-6); }
    .mtest-mark { top: -30px; font-size: 100px; }
    .mtest-main { padding-left: 0; }
    .mtest-panel { order: -1; padding: 20px; }
    .mtest-quote { font-size: clamp(1.45rem, 1rem + 2.4vw, 2rem); }

    /* stores */
    .mstores-grid { grid-template-columns: 1fr; }
    .mstores-grid > *:last-child { order: -1; width: 100%; border-radius: var(--radius-lg); overflow: hidden; }

    /* footer — brand full-width, 3 link cols below */
    .mfoot-grid { grid-template-columns: 1fr 1fr 1fr; gap: 2.5rem 2rem; }
    .mfoot-grid > *:first-child { grid-column: 1 / -1; }

    /* assisted shopping becomes a bottom sheet ~2/3 height, never full-screen */
    .massist {
      right: 0; left: 0; bottom: 0; width: auto; max-height: 66vh;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border-left: none; border-right: none; border-bottom: none;
      transform: translateY(100%);
    }
    .massist[data-open="1"] { transform: translateY(0); }
  }

  /* ---- narrow phone (< 600px) — CTAs stack, carousel wider ---- */
  @media (max-width: 599px) {
    .mhero-ctas { flex-direction: column; }
    .mhero-ctas > * { width: 100%; justify-content: center; }
    .mfab-item { flex-basis: 82%; }
    .mfoot-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ---- small mobile (< 480px) ---- */
  @media (max-width: 479px) {
    .mocc-grid { gap: 10px; }
    .mfabcat-grid { gap: var(--space-3); }
    .mfab-item { flex-basis: 82%; }
    .mfoot-grid { grid-template-columns: 1fr; }
    .mfoot-base { flex-direction: column; align-items: flex-start; gap: 10px; }
    .mtest-stats { flex-direction: column; gap: var(--space-3); }
    .mtest-stats div + div { border-left: none; border-top: 1px solid var(--zari-15); padding-top: 16px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>

  <script type="text/babel" data-presets="react" src="Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="Hero.jsx"></script>
  <script type="text/babel" data-presets="react" src="Sections.jsx"></script>
  <script type="text/babel" data-presets="react" src="Footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="AssistedShopping.jsx"></script>
  <script type="text/babel" data-presets="react" src="App.jsx"></script>
</body>
</html>
