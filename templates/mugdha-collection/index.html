<!-- @template name="Mugdha Collection" description="Filterable saree collection / product-listing page — shop by colour, fabric and price." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Mugdha Collection — Shop sarees by colour</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; font-family: var(--font-body); background: var(--oyster); color: var(--text-body); -webkit-font-smoothing: antialiased; }
  img { max-width: 100%; }
  a { color: inherit; }

  .d-block { display: block; } .d-flex { display: flex; } .d-inline { display: inline-flex; }
  .m-inline { display: none !important; }

  /* ===== Header ===== */
  .chead { position: sticky; top: 0; z-index: 50; background: rgba(22,9,16,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--zari-15); transition: border-color var(--motion-base) var(--ease-silk); }
  .chead.scrolled { border-bottom-color: var(--zari-30); }
  .chead-inner { max-width: var(--container-max); margin: 0 auto; padding: 16px var(--container-pad); display: flex; align-items: center; justify-content: space-between; gap: 24px; position: relative; }
  .chead-nav { gap: 30px; flex: 1; align-items: center; }
  .mnav-link { font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 500; letter-spacing: 0.04em; color: var(--oyster); text-decoration: none; opacity: 0.88; position: relative; padding-bottom: 3px; white-space: nowrap; }
  .mnav-link::after { content: ""; position: absolute; left: 0; right: 100%; bottom: 0; height: 1px; background: var(--zari); transition: right var(--motion-base) var(--ease-silk); }
  .mnav-link:hover { opacity: 1; } .mnav-link:hover::after { right: 0; }
  .chead-logo { position: absolute; left: 50%; transform: translateX(-50%); display: inline-flex; }
  .chead-logo img { height: 28px; width: auto; display: block; }
  .chead-utils { display: flex; gap: 4px; align-items: center; flex: 1; justify-content: flex-end; }
  .chead-utils button { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--oyster); cursor: pointer; border-radius: var(--radius-md); }

  /* ===== Hero band ===== */
  .chero { background: linear-gradient(160deg, #2a0f1b 0%, var(--mulberry-ink) 60%, #160910 100%); border-bottom: 1px solid var(--zari-30); position: relative; overflow: hidden; }
  .chero-inner { max-width: var(--container-max); margin: 0 auto; padding: clamp(2.5rem, 5vw, 4.5rem) var(--container-pad); position: relative; z-index: 1; }
  .chero-crumb { font-size: var(--fs-xs); letter-spacing: 0.06em; color: var(--smoke-taupe); text-transform: uppercase; }
  .chero-crumb span { margin: 0 8px; opacity: 0.5; }
  .chero-eyebrow { display: inline-flex; align-items: center; gap: 12px; margin-top: 20px; font-size: var(--fs-xs); font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--zari); white-space: nowrap; }
  .chero-rule { width: 30px; height: 1px; background: var(--zari); display: inline-block; }
  .chero-title { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-display); line-height: 1.05; letter-spacing: var(--tracking-display); color: var(--oyster); margin: 12px 0 0; }
  .chero-sub { font-family: var(--font-body); font-size: var(--fs-md); line-height: 1.55; color: rgba(239,234,225,0.78); margin: 14px 0 0; max-width: 56ch; }

  /* ===== Layout ===== */
  .cwrap { max-width: var(--container-max); margin: 0 auto; padding: var(--space-7) var(--container-pad) var(--space-9); display: grid; grid-template-columns: 264px 1fr; gap: var(--space-7); align-items: start; }
  .crail { position: sticky; top: 92px; }

  /* ===== Filters ===== */
  .cfilters { display: flex; flex-direction: column; gap: var(--space-6); }
  .cfilter-group { border-bottom: 1px solid var(--ink-on-oyster-08); padding-bottom: var(--space-5); }
  .cfilter-group:last-child { border-bottom: none; }
  .cfilter-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cfilter-title { font-family: var(--font-body); font-size: var(--fs-xs); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-strong); }
  .cfilter-n { font-size: 11px; background: var(--magenta); color: var(--oyster); border-radius: 999px; min-width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; padding: 0 5px; }

  /* color swatches */
  .cswatches { display: flex; flex-direction: column; gap: 2px; }
  .cswatch { display: flex; align-items: center; gap: 12px; padding: 7px 8px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius-md); text-align: left; transition: background var(--motion-fast) var(--ease-standard); }
  .cswatch:hover { background: var(--oyster-down); }
  .cswatch.on { background: rgba(141,10,84,0.06); }
  .cswatch-dot { flex: none; width: 22px; height: 22px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(36,14,21,0.18); display: inline-flex; align-items: center; justify-content: center; }
  .cswatch-dot i { width: 13px; height: 13px; color: #fff; }
  .cswatch[title*="White"] .cswatch-dot i, .cswatch[title*="Yellow"] .cswatch-dot i { color: var(--mulberry-ink); }
  .cswatch-label { font-size: var(--fs-sm); color: var(--text-body); flex: 1; }
  .cswatch.on .cswatch-label { font-weight: 600; color: var(--text-strong); }
  .cswatch-count { font-size: var(--fs-xs); color: var(--text-muted); font-variant-numeric: tabular-nums; }

  /* fabric checks */
  .cchecks { display: flex; flex-direction: column; gap: 2px; }
  .ccheck { display: flex; align-items: center; gap: 11px; padding: 7px 8px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius-md); text-align: left; transition: background var(--motion-fast) var(--ease-standard); }
  .ccheck:hover { background: var(--oyster-down); }
  .ccheck-box { flex: none; width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--smoke-taupe); display: inline-flex; align-items: center; justify-content: center; transition: all var(--motion-fast) var(--ease-standard); }
  .ccheck-box i { width: 12px; height: 12px; color: var(--oyster); }
  .ccheck.on .ccheck-box { background: var(--magenta); border-color: var(--magenta); }
  .ccheck-label { font-size: var(--fs-sm); color: var(--text-body); flex: 1; }
  .ccheck.on .ccheck-label { font-weight: 600; color: var(--text-strong); }
  .ccheck-count { font-size: var(--fs-xs); color: var(--text-muted); font-variant-numeric: tabular-nums; }

  /* price */
  .cprice input[type=range] { width: 100%; accent-color: var(--magenta); }
  .cprice-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: var(--fs-xs); color: var(--text-muted); }
  .cprice-max { color: var(--text-strong); font-weight: 600; }

  .cclear-all { display: inline-flex; align-items: center; gap: 8px; background: transparent; border: 1px solid var(--ink-on-oyster-08); color: var(--text-body); font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 600; padding: 10px 16px; border-radius: var(--radius-md); cursor: pointer; }
  .cclear-all i { width: 15px; height: 15px; }
  .cclear-all:hover { border-color: var(--magenta); color: var(--magenta); }
  .cclear-all:disabled { opacity: 0.4; cursor: default; border-color: var(--ink-on-oyster-08); color: var(--text-muted); }

  /* ===== Toolbar ===== */
  .cmain { min-width: 0; }
  .ctoolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-bottom: var(--space-4); border-bottom: 1px solid var(--ink-on-oyster-08); }
  .ctoolbar-left { display: flex; align-items: center; gap: 16px; }
  .ccount { font-size: var(--fs-md); color: var(--text-body); }
  .ccount strong { font-family: var(--font-display); font-weight: 600; color: var(--text-strong); }
  .cfilter-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--mulberry-ink); color: var(--oyster); border: none; padding: 10px 16px; border-radius: var(--radius-md); font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 600; cursor: pointer; }
  .cfilter-btn i { width: 16px; height: 16px; }
  .csort { display: flex; align-items: center; gap: 10px; }
  .csort label { font-size: var(--fs-sm); color: var(--text-muted); }
  .cselect { position: relative; display: inline-flex; align-items: center; }
  .cselect select { appearance: none; -webkit-appearance: none; background: transparent; border: 1px solid var(--ink-on-oyster-08); border-radius: var(--radius-md); padding: 9px 36px 9px 14px; font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 600; color: var(--text-strong); cursor: pointer; }
  .cselect i { position: absolute; right: 12px; width: 16px; height: 16px; color: var(--text-muted); pointer-events: none; }

  /* active chips */
  .cchips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: var(--space-4) 0 0; }
  .cchip { display: inline-flex; align-items: center; gap: 6px; background: var(--mulberry-ink); color: var(--oyster); border: none; border-radius: var(--radius-pill); padding: 6px 12px; font-family: var(--font-body); font-size: var(--fs-xs); font-weight: 600; cursor: pointer; letter-spacing: 0.02em; }
  .cchip i { width: 12px; height: 12px; opacity: 0.7; }
  .cchip:hover i { opacity: 1; }
  .cclear-link { background: none; border: none; color: var(--magenta); font-family: var(--font-body); font-size: var(--fs-sm); font-weight: 600; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

  /* ===== Grid ===== */
  .cgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-6) var(--space-5); margin-top: var(--space-5); }
  .ccard { display: flex; flex-direction: column; gap: 12px; text-decoration: none; color: inherit; }
  .ccard-img { position: relative; aspect-ratio: 3 / 4; border-radius: var(--radius-lg); overflow: hidden; background: var(--mulberry-ink-90); box-shadow: inset 0 0 0 1px var(--zari-15); }
  .ccard-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform var(--motion-slow) var(--ease-silk); }
  .ccard:hover .ccard-img img { transform: scale(1.045); }
  .ccard-offer { position: absolute; top: 10px; left: 10px; background: var(--magenta); color: var(--oyster); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; padding: 4px 9px; border-radius: var(--radius-sm); z-index: 2; }
  /* zari border weave on hover */
  .ccard-weave { position: absolute; inset: 9px; width: calc(100% - 18px); height: calc(100% - 18px); pointer-events: none; overflow: visible; }
  .ccard-weave rect { fill: none; stroke: var(--zari); vector-effect: non-scaling-stroke; stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset var(--motion-slow) var(--ease-silk); }
  .ccard-weave-1 { stroke-width: 1.5; }
  .ccard-weave-2 { stroke-width: 0.75; opacity: 0.55; transition-delay: 120ms; }
  .ccard:hover .ccard-weave rect { stroke-dashoffset: 0; }
  @media (prefers-reduced-motion: reduce) { .ccard-weave rect { transition: none; } .ccard:hover .ccard-img img { transform: none; } }
  .ccard-body { display: flex; flex-direction: column; gap: 3px; }
  .ccard-fabric { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.1em; color: var(--magenta); font-weight: 600; }
  .ccard-name { font-family: var(--font-body); font-size: var(--fs-sm); line-height: 1.35; color: var(--text-strong); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.7em; }
  .ccard-price { font-family: var(--font-body); font-size: var(--fs-md); font-weight: 600; color: var(--text-strong); font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 8px; }
  .ccard-mrp { font-size: var(--fs-sm); font-weight: 400; color: var(--text-muted); text-decoration: line-through; }

  .cempty { text-align: center; padding: var(--space-9) 0; display: flex; flex-direction: column; align-items: center; gap: var(--space-4); }
  .cempty p { font-family: var(--font-display); font-size: var(--fs-subtitle); color: var(--text-strong); }

  /* ===== Mobile drawer ===== */
  .cdrawer-scrim { position: fixed; inset: 0; z-index: 60; background: rgba(22,9,16,0.55); opacity: 0; pointer-events: none; transition: opacity var(--motion-base) var(--ease-silk); }
  .cdrawer-scrim.open { opacity: 1; pointer-events: auto; }
  .cdrawer { position: fixed; z-index: 65; top: 0; bottom: 0; left: 0; width: min(86vw, 360px); background: var(--oyster); transform: translateX(-100%); transition: transform var(--motion-slow) var(--ease-silk); display: flex; flex-direction: column; }
  .cdrawer.open { transform: translateX(0); }
  .cdrawer-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--ink-on-oyster-08); }
  .cdrawer-head span { font-family: var(--font-display); font-size: var(--fs-subtitle); font-weight: 600; color: var(--text-strong); }
  .cdrawer-head button { width: 38px; height: 38px; border: none; background: transparent; cursor: pointer; color: var(--text-strong); }
  .cdrawer-body { flex: 1; overflow-y: auto; padding: 20px; }
  .cdrawer-foot { padding: 16px 20px; border-top: 1px solid var(--ink-on-oyster-08); }

  /* ===== Responsive ===== */
  @media (max-width: 1100px) { .cgrid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 920px) {
    .d-block { display: none !important; } .m-inline { display: inline-flex !important; }
    .chead-nav { display: none; }
    .cwrap { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .cgrid { grid-template-columns: repeat(2, 1fr); gap: var(--space-5) var(--space-4); }
  }
  @media (min-width: 921px) { .cfilter-btn { display: none !important; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="collection-data.js"></script>

  <script type="text/babel" data-presets="react" src="CollectionParts.jsx"></script>
  <script type="text/babel" data-presets="react" src="Collection.jsx"></script>
  <script>
    (function () {
      function hydrate() { if (window.lucide) window.lucide.createIcons({ attrs: { "stroke-width": 1.5, width: 20, height: 20 } }); }
      var raf = 0;
      new MutationObserver(function () { cancelAnimationFrame(raf); raf = requestAnimationFrame(hydrate); }).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
